TebLocalPlannerROS:
  odom_topic: /odom
  map_frame: map

  teb_autosize: true
  dt_ref: 0.34
  dt_hysteresis: 0.08
  max_samples: 500
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: false
  max_global_plan_lookahead_dist: 3.2
  global_plan_viapoint_sep: 0.45
  global_plan_prune_distance: 0.7
  exact_arc_length: true
  feasibility_check_no_poses: 5
  publish_feedback: false

  max_vel_x: 0.22
  max_vel_x_backwards: 0.01
  max_vel_y: 0.0
  max_vel_theta: 0.55
  acc_lim_x: 0.40
  acc_lim_y: 0.0
  acc_lim_theta: 0.70
  min_turning_radius: 0.98
  wheelbase: 0.41893
  cmd_angle_instead_rotvel: true

  xy_goal_tolerance: 0.45
  yaw_goal_tolerance: 1.57
  free_goal_vel: false
  complete_global_plan: true

  footprint_model:
    type: polygon
    vertices: [[0.30, 0.18], [0.30, -0.18], [-0.30, -0.18], [-0.30, 0.18]]

  min_obstacle_dist: 0.32
  inflation_dist: 0.52
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 15
  dynamic_obstacle_inflation_dist: 0.65
  include_dynamic_obstacles: false

  no_inner_iterations: 6
  no_outer_iterations: 4
  optimization_activate: true
  optimization_verbose: false
  penalty_epsilon: 0.005
  weight_max_vel_x: 2.0
  weight_max_vel_theta: 1.4
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 2.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 1000.0
  weight_kinematics_turning_radius: 16.0
  weight_optimaltime: 1.0
  weight_shortest_path: 0.0
  weight_obstacle: 50.0
  weight_inflation: 0.2
  weight_viapoint: 0.8

  enable_homotopy_class_planning: false
  enable_multithreading: true
  simple_exploration: false
  max_number_classes: 1
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.95
  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 2.0
